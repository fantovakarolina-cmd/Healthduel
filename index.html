<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zdravý Souboj: Lůca vs Kája</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09091a; color: white; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .avatar { transition: left 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: absolute; }
        .gold { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .quote-gradient { background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="antialiased">
    <div id="app" class="max-w-md mx-auto p-4 pb-20">
        <div class="flex justify-between items-center mb-4 pt-6 text-sm">
            <h1 class="font-black italic text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400 uppercase tracking-tighter text-lg">Health Duel ⚔️</h1>
            <div class="flex gap-2">
                <button onclick="syncData(true)" class="bg-blue-600/40 text-blue-200 px-3 py-1 rounded-lg font-bold text-[10px] border border-blue-500/30">🔄 SYNC</button>
                <button onclick="totalReset()" class="bg-gray-800 text-gray-400 px-2 py-1 rounded-lg font-bold text-[10px]">RESET</button>
            </div>
        </div>

        <div class="flex justify-end mb-4">
            <button onclick="archiveWeek()" class="text-[10px] bg-red-600 text-white px-4 py-2 rounded-full uppercase tracking-widest font-black shadow-lg shadow-red-600/20 active:scale-95 transition-all">🏆 Ukončit týden</button>
        </div>

        <div id="hall-of-fame" class="glass rounded-2xl p-3 mb-4 text-center text-xs hidden border-yellow-500/20 shadow-[0_0_15px_rgba(255,215,0,0.1)]">
            <span class="opacity-60 uppercase tracking-widest">Poslední vítězka:</span>
            <span id="last-winner" class="font-bold gold ml-2 uppercase tracking-tight"></span>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-6 p-1 bg-white/5 rounded-2xl text-sm">
            <button id="btn-userA" onclick="switchUser('userA')" class="py-3 rounded-xl font-bold transition-all">👱‍♀️ Lůca</button>
            <button id="btn-userB" onclick="switchUser('userB')" class="py-3 rounded-xl font-bold transition-all">👩🏽 Kája</button>
        </div>

        <div class="glass rounded-3xl p-6 mb-6 overflow-hidden relative border-white/5">
            <div class="absolute top-2 right-4 text-[9px] font-bold opacity-20 uppercase tracking-widest text-blue-400">Cíl: 300 bodů</div>
            <div class="h-24 relative bg-black/30 rounded-xl p-2 border border-white/5">
                <div class="h-1/2 border-b border-white/5 relative">
                    <div id="avatar-userA" class="avatar -top-1 text-2xl" style="left: 0%">👱‍♀️</div>
                </div>
                <div class="h-1/2 relative">
                    <div id="avatar-userB" class="avatar top-1 text-2xl" style="left: 0%">👩🏽</div>
                </div>
                <div class="absolute right-0 top-0 bottom-0 w-1 bg-yellow-400 shadow-[0_0_15px_yellow]"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6 font-black">
            <div class="glass p-4 rounded-2xl text-center border-pink-500/30">
                <div class="text-[10px] opacity-50 uppercase tracking-widest mb-1">Lůca</div>
                <div id="score-userA" class="text-3xl text-pink-500">0</div>
            </div>
            <div class="glass p-4 rounded-2xl text-center border-orange-500/30">
                <div class="text-[10px] opacity-50 uppercase tracking-widest mb-1">Kája</div>
                <div id="score-userB" class="text-3xl text-orange-500">0</div>
            </div>
        </div>

        <div id="habit-list" class="space-y-2 mb-6"></div>

        <div class="bg-indigo-600/20 border border-indigo-500/30 rounded-3xl p-5 mb-6 flex items-center justify-between">
            <div class="text-xs">
                <div class="opacity-50 font-bold uppercase text-[9px]">Dnešní výzva +15b</div>
                <div id="today-quest" class="font-bold text-white uppercase italic tracking-tight">---</div>
            </div>
            <button id="quest-btn" onclick="completeQuest()" class="bg-indigo-500 px-4 py-2 rounded-xl font-bold text-xs shadow-lg active:scale-95 transition-transform">SPLNIT</button>
        </div>

        <div class="glass rounded-3xl p-5 mb-6">
            <div class="flex gap-2">
                <input id="custom-input" type="text" placeholder="Aktivita..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm text-white focus:outline-none">
                <button onclick="addCustom()" class="bg-green-500 px-4 rounded-xl font-bold text-xs">PŘIDAT</button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6 text-[9px] font-bold uppercase italic">
            <button onclick="addPenalty('Alkohol', -10, '🍷')" class="bg-red-500/10 border border-red-500/20 p-3 rounded-2xl text-red-400 text-center">🍷 ALKOHOL -10</button>
            <button onclick="addPenalty('Pozdě', -5, '😴')" class="bg-red-500/10 border border-red-500/20 p-3 rounded-2xl text-red-400 text-center">😴 PO 8:00 -5</button>
            <button onclick="addPenalty('Cukr', -5, '🍩')" class="bg-red-500/10 border border-red-500/20 p-3 rounded-2xl text-red-400 text-center">🍩 CUKR -5</button>
        </div>

        <div id="log" class="space-y-2 text-[10px] opacity-40 italic mb-10"></div>

        <div class="mt-12 mb-8 text-center px-6">
            <div class="text-[8px] uppercase tracking-[0.4em] opacity-30 mb-3">Vesmírná energie dne</div>
            <div id="ezo-quote" class="italic font-serif text-sm quote-gradient leading-relaxed"></div>
        </div>
    </div>

    <script>
        const BIN_ID = 'fdf54930b04517ca8352';
        const API_URL = `https://api.npoint.io/${BIN_ID}`;
        const GOAL = 300;

        const HABITS = [
            { id: "water",   label: "2L vody", points: 2, icon: "💧" },
            { id: "sleep",   label: "8h spánek", points: 2, icon: "🌙" },
            { id: "nosugar", label: "Bez cukru", points: 3, icon: "🚫" },
            { id: "steps",   label: "10 000 kroků", points: 3, icon: "👟" },
            { id: "veggies", label: "Zelenina", points: 2, icon: "🥦" }
        ];

        const SIDE_QUESTS = [
            "30 angličáků 💪", "Studená sprcha 🚿", "1h bez telefonu 📵", "Bez slazeného pití 🥤", 
            "Chůze 5 km 🚶", "Srovnat si pokoj 🧹", "15 min strečink 🤸", "Plank 2 minuty ⏳", 
            "Zdravé domácí jídlo 🍳", "3h před spaním nejíst 🌙"
        ];

        const EZO_QUOTES = [
            "Tvé tělo je chrám tvé duše, vymeť z něj prach disciplínou. ✨",
            "Vesmír ti nenadělí výzvu, kterou bys nedokázala zdolat. 🌌",
            "Dnešní pot je slzami tvého starého já, které odchází. 🌸",
            "Kdo ovládne své ráno, ovládne svou manifestaci. ☀️",
            "Tvá energie proudí tam, kam zaměřuješ pozornost. ✨",
            "V tichu mezi nádechy najdeš sílu udělat další angličák. 🌬️",
            "Buď jako voda – měkká navenek, ale schopná prorazit skálu. 🌊"
        ];
        
        let currentUser = localStorage.getItem('activeUser') || "userA";
        let state = { 
            userA: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] }, 
            userB: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] },
            lastWinner: null 
        };

        async function syncData(force = false) {
            try {
                // Přidání časové značky zabrání načítání starých dat z mezipaměti
                const url = force ? `${API_URL}?t=${Date.now()}` : API_URL;
                const res = await fetch(url);
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.userA && data.userB) {
                        state = data;
                        render();
                    }
                }
            } catch (e) { console.error("Sync error"); }
        }

        async function save() {
            render();
            try {
                // Používáme PUT pro spolehlivější zápis na npoint
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state)
                });
            } catch (e) { console.error("Save error"); }
        }

        function render() {
            document.getElementById('btn-userA').className = `py-3 rounded-xl font-bold transition-all ${currentUser === 'userA' ? 'bg-white/20' : 'opacity-40'}`;
            document.getElementById('btn-userB').className = `py-3 rounded-xl font-bold transition-all ${currentUser === 'userB' ? 'bg-white/20' : 'opacity-40'}`;
            document.getElementById('score-userA').innerText = state.userA.weeklyPoints;
            document.getElementById('score-userB').innerText = state.userB.weeklyPoints;
            document.getElementById('avatar-userA').style.left = Math.min((state.userA.weeklyPoints / GOAL) * 90, 90) + "%";
            document.getElementById('avatar-userB').style.left = Math.min((state.userB.weeklyPoints / GOAL) * 90, 90) + "%";

            const hf = document.getElementById('hall-of-fame');
            if (state.lastWinner) {
                hf.classList.remove('hidden');
                document.getElementById('last-winner').innerText = state.lastWinner;
            } else { hf.classList.add('hidden'); }

            const list = document.getElementById('habit-list');
            list.innerHTML = '';
            HABITS.forEach(h => {
                const ch = state[currentUser].checkedHabits[h.id];
                const div = document.createElement('div');
                div.onclick = () => toggleHabit(h.id);
                div.className = `flex items-center gap-4 p-3 rounded-xl border transition-all ${ch ? 'bg-green-500/20 border-green-500/50 opacity-40' : 'bg-white/5 border-white/10'}`;
                div.innerHTML = `<div class="w-6 h-6 rounded-md border-2 flex items-center justify-center ${ch ? 'bg-green-500 border-none' : 'border-white/20'}">${ch ? '✓' : ''}</div><span class="text-xl">${h.icon}</span><span class="flex-1 font-medium italic text-xs tracking-tight">${h.label}</span><span class="font-black text-green-400 text-xs">+${h.points}</span>`;
                list.appendChild(div);
            });

            const dayIndex = (new Date().getDay() + 6) % 7; 
            document.getElementById('today-quest').innerText = SIDE_QUESTS[dayIndex % SIDE_QUESTS.length];
            document.getElementById('ezo-quote').innerText = `„${EZO_QUOTES[dayIndex % EZO_QUOTES.length]}“`;
            
            const qBtn = document.getElementById('quest-btn');
            qBtn.disabled = state[currentUser].questDone;
            qBtn.innerText = state[currentUser].questDone ? "HOTOVO" : "SPLNIT";

            const logDiv = document.getElementById('log');
            const allLogs = [...state.userA.log, ...state.userB.log].sort((a,b) => b.ts - a.ts).slice(0, 4);
            logDiv.innerHTML = allLogs.map(l => `<div class="flex justify-between border-b border-white/5 pb-1"><span>${l.icon} ${l.u}: ${l.a}</span><span>${l.d > 0 ? '+' : ''}${l.d}</span></div>`).join('');
        }

        function switchUser(id) { currentUser = id; localStorage.setItem('activeUser', id); render(); }

        function toggleHabit(id) {
            const h = HABITS.find(x => x.id === id);
            const was = !!state[currentUser].checkedHabits[id];
            state[currentUser].checkedHabits[id] = !was;
            const delta = was ? -h.points : h.points;
            state[currentUser].weeklyPoints = Math.max(0, state[currentUser].weeklyPoints + delta);
            state[currentUser].log.unshift({ u: currentUser === 'userA' ? 'Lůca' : 'Kája', a: h.label, d: delta, icon: h.icon, ts: Date.now() });
            save();
        }

        function addPenalty(label, delta, icon) {
            state[currentUser].weeklyPoints = Math.max(0, state[currentUser].weeklyPoints + delta);
            state[currentUser].log.unshift({ u: currentUser === 'userA' ? 'Lůca' : 'Kája', a: label, d: delta, icon: icon, ts: Date.now() });
            save();
        }

        function completeQuest() {
            state[currentUser].questDone = true;
            state[currentUser].weeklyPoints += 15;
            state[currentUser].log.unshift({ u: currentUser === 'userA' ? 'Lůca' : 'Kája', a: "Výzva", d: 15, icon: "⚡", ts: Date.now() });
            save();
        }

        function addCustom() {
            const val = document.getElementById('custom-input').value.trim();
            if (!val) return;
            state[currentUser].weeklyPoints += 10;
            state[currentUser].log.unshift({ u: currentUser === 'userA' ? 'Lůca' : 'Kája', a: val, d: 10, icon: "🏋️", ts: Date.now() });
            document.getElementById('custom-input').value = '';
            save();
        }

        function archiveWeek() {
            if(confirm("Ukončit týden a vyhlásit vítězku?")) {
                let winner = "Remíza!";
                if (state.userA.weeklyPoints > state.userB.weeklyPoints) winner = "Lůca 🔥";
                else if (state.userB.weeklyPoints > state.userA.weeklyPoints) winner = "Kája 🔥";
                
                state = {
                    userA: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] },
                    userB: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] },
                    lastWinner: winner
                };
                save();
            }
        }

        function totalReset() {
            if(confirm("Smazat úplně všechno?")) {
                state = {
                    userA: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] },
                    userB: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] },
                    lastWinner: null
                };
                save();
            }
        }

        // První načtení
        syncData();
        // Automatická synchronizace každých 15 sekund
        setInterval(() => syncData(false), 15000);
    </script>
</body>
</html>
