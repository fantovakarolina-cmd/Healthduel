<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zdravý Souboj: Lůca vs Kája</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09091a; color: white; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .avatar { transition: left 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: absolute; }
        .gold { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .quote-gradient { background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .track-bg { background: repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px); }
    </style>
</head>
<body class="antialiased">
    <div id="app" class="max-w-md mx-auto p-4 pb-20">
        
        <div class="text-center pt-8 mb-8 relative">
            <h1 class="font-black italic text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400 uppercase tracking-tighter text-4xl mb-2 drop-shadow-lg">Health Duel ⚔️</h1>
            <div id="current-date-display" class="text-xs font-bold uppercase tracking-[0.3em] opacity-60 text-blue-200">---</div>
            
            <div class="absolute top-2 right-0">
                <button id="sync-btn" onclick="syncData(true)" class="bg-blue-600/20 text-blue-300 px-3 py-1.5 rounded-xl font-bold text-[10px] border border-blue-500/20 transition-all shadow-lg active:scale-95">🔄 SYNC</button>
            </div>
        </div>

        <div id="hall-of-fame" class="glass rounded-2xl p-3 mb-6 text-center text-xs hidden border-yellow-500/20 shadow-[0_0_15px_rgba(255,215,0,0.1)]">
            <span class="opacity-60 uppercase tracking-widest">Poslední vítězka:</span>
            <span id="last-winner" class="font-bold gold ml-2 uppercase tracking-tight"></span>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-6 p-1 bg-white/5 rounded-2xl text-sm shadow-inner border border-white/5">
            <button id="btn-userA" onclick="switchUser('userA')" class="py-3 rounded-xl font-bold transition-all">👱‍♀️ Lůca</button>
            <button id="btn-userB" onclick="switchUser('userB')" class="py-3 rounded-xl font-bold transition-all">👩🏽 Kája</button>
        </div>

        <div class="glass rounded-3xl p-5 mb-8 overflow-hidden relative border-white/10 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <div class="flex justify-between items-center mb-3 px-1">
                <div class="text-[10px] font-bold opacity-40 uppercase tracking-widest">Trať k vítězství</div>
                <div class="text-[10px] font-bold uppercase tracking-widest text-yellow-500/80 bg-yellow-500/10 px-2 py-1 rounded-md">Cíl: 300 bodů</div>
            </div>
            
            <div class="h-28 relative bg-black/50 track-bg rounded-xl border border-white/10 shadow-inner overflow-hidden">
                <div class="absolute top-0 bottom-0 left-[16.6%] border-l border-white/10 flex items-end pb-1 pl-1 text-[8px] opacity-40 font-bold">50</div>
                <div class="absolute top-0 bottom-0 left-[33.3%] border-l border-white/10 flex items-end pb-1 pl-1 text-[8px] opacity-40 font-bold">100</div>
                <div class="absolute top-0 bottom-0 left-[50%] border-l border-white/20 flex items-end pb-1 pl-1 text-[8px] opacity-60 font-black text-white">150</div>
                <div class="absolute top-0 bottom-0 left-[66.6%] border-l border-white/10 flex items-end pb-1 pl-1 text-[8px] opacity-40 font-bold">200</div>
                <div class="absolute top-0 bottom-0 left-[83.3%] border-l border-white/10 flex items-end pb-1 pl-1 text-[8px] opacity-40 font-bold">250</div>
                
                <div class="h-1/2 border-b-2 border-dashed border-white/10 relative flex items-center">
                    <div id="avatar-userA" class="avatar text-2xl drop-shadow-lg z-10" style="left: 0%">👱‍♀️</div>
                </div>
                <div class="h-1/2 relative flex items-center">
                    <div id="avatar-userB" class="avatar text-2xl drop-shadow-lg z-10" style="left: 0%">👩🏽</div>
                </div>
                
                <div class="absolute right-0 top-0 bottom-0 w-2 bg-yellow-400/80 border-l-2 border-dashed border-black shadow-[0_0_15px_yellow]"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8 font-black">
            <div class="glass p-4 rounded-3xl text-center border-pink-500/30 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-16 h-16 bg-pink-500/20 rounded-full blur-xl"></div>
                <div class="text-[10px] opacity-50 uppercase tracking-widest mb-1">Lůca</div>
                <div id="score-userA" class="text-4xl text-pink-500 drop-shadow-md">0</div>
            </div>
            <div class="glass p-4 rounded-3xl text-center border-orange-500/30 relative overflow-hidden">
                <div class="absolute -left-4 -top-4 w-16 h-16 bg-orange-500/20 rounded-full blur-xl"></div>
                <div class="text-[10px] opacity-50 uppercase tracking-widest mb-1">Kája</div>
                <div id="score-userB" class="text-4xl text-orange-500 drop-shadow-md">0</div>
            </div>
        </div>

        <div id="habit-list" class="space-y-3 mb-8"></div>

        <div class="bg-indigo-600/20 border border-indigo-500/30 rounded-3xl p-5 mb-8 flex items-center justify-between shadow-lg relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
            <div class="text-xs">
                <div class="opacity-50 font-bold uppercase text-[9px] tracking-widest mb-1">Dnešní výzva <span class="text-indigo-300">+15b</span></div>
                <div id="today-quest" class="font-bold text-white uppercase italic tracking-tight text-sm">---</div>
            </div>
            <button id="quest-btn" onclick="completeQuest()" class="bg-indigo-500 px-5 py-3 rounded-xl font-bold text-xs shadow-lg active:scale-95 transition-transform z-10">SPLNIT</button>
        </div>

        <div class="glass rounded-3xl p-5 mb-8">
            <div class="flex gap-2">
                <input id="custom-input" type="text" placeholder="Fitko, běh, jiná aktivita..." class="flex-1 bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-white/30 transition-colors">
                <button onclick="addCustom()" class="bg-green-500 px-5 rounded-xl font-black text-xs shadow-lg shadow-green-500/20 active:scale-95 transition-transform">PŘIDAT</button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-8 text-[9px] font-bold uppercase italic">
            <button onclick="addPenalty('Alkohol', -10, '🍷')" class="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl text-red-400 text-center active:bg-red-500/20 transition-colors">🍷 ALKOHOL<br>-10</button>
            <button onclick="addPenalty('Pozdě', -5, '😴')" class="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl text-red-400 text-center active:bg-red-500/20 transition-colors">😴 PO 8:00<br>-5</button>
            <button onclick="addPenalty('Cukr', -5, '🍩')" class="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl text-red-400 text-center active:bg-red-500/20 transition-colors">🍩 CUKR<br>-5</button>
        </div>

        <div class="mb-10">
            <div class="text-[10px] uppercase tracking-[0.2em] opacity-30 mb-3 px-2">Poslední akce</div>
            <div id="log" class="space-y-2 text-[10px] opacity-50 italic px-2 bg-black/20 p-4 rounded-2xl border border-white/5"></div>
        </div>

        <div class="glass rounded-3xl p-5 mb-10 border-white/5 flex flex-col gap-3">
            <div class="text-[9px] uppercase tracking-[0.2em] opacity-30 text-center mb-1 font-bold">Správa souboje</div>
            <button onclick="archiveWeek()" class="bg-gradient-to-r from-red-600 to-red-800 text-white px-4 py-3 rounded-xl uppercase tracking-widest font-black shadow-lg shadow-red-600/20 active:scale-95 transition-all text-xs w-full border border-red-500/50">🏆 Ukončit týden</button>
            <button onclick="totalReset()" class="bg-black/50 text-gray-500 hover:text-red-400 px-4 py-3 rounded-xl font-bold text-[10px] w-full border border-white/5 transition-colors uppercase tracking-widest">⚠️ Úplný reset databáze</button>
        </div>

        <div class="mt-8 mb-8 text-center px-6">
            <div class="text-[8px] uppercase tracking-[0.4em] opacity-30 mb-3">Vesmírná energie dne</div>
            <div id="ezo-quote" class="italic font-serif text-sm quote-gradient leading-relaxed"></div>
        </div>
    </div>

    <script>
        const BIN_ID = 'fdf54930b04517ca8352';
        const API_URL = `https://api.npoint.io/${BIN_ID}`;
        const GOAL = 300;

        const HABITS = [
            { id: "water",   label: "2L vody", points: 2, icon: "💧" },
            { id: "sleep",   label: "8h spánek", points: 2, icon: "🌙" },
            { id: "nosugar", label: "Bez cukru", points: 3, icon: "🚫" },
            { id: "steps",   label: "10 000 kroků", points: 3, icon: "👟" },
            { id: "veggies", label: "Zelenina", points: 2, icon: "🥦" }
        ];

        const SIDE_QUESTS = [
            "30 angličáků 💪", "Studená sprcha 🚿", "1h bez telefonu 📵", "Bez slazeného pití 🥤", 
            "Chůze 5 km 🚶", "Srovnat si pokoj 🧹", "15 min strečink 🤸", "Plank 2 minuty ⏳", 
            "Zdravé domácí jídlo 🍳", "3h před spaním nejíst 🌙"
        ];

        const EZO_QUOTES = [
            "Tvé tělo je chrám tvé duše, vymeť z něj prach disciplínou. ✨",
            "Vesmír ti nenadělí výzvu, kterou bys nedokázala zdolat. 🌌",
            "Dnešní pot je slzami tvého starého já, které odchází. 🌸",
            "Kdo ovládne své ráno, ovládne svou manifestaci. ☀️",
            "Tvá energie proudí tam, kam zaměřuješ pozornost. ✨",
            "V tichu mezi nádechy najdeš sílu udělat další angličák. 🌬️",
            "Buď jako voda – měkká navenek, ale schopná prorazit skálu. 🌊"
        ];
        
        let currentUser = localStorage.getItem('activeUser') || "userA";
        
        // Přidáno currentDay pro reset úkolů na denní bázi
        let state = { 
            userA: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] }, 
            userB: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] },
            lastWinner: null,
            lastUpdated: 0,
            currentDay: new Date().toDateString()
        };
        
        let isSaving = false;

        // Vykreslení aktuálního data do hlavičky
        function renderDate() {
            const dny = ['Neděle', 'Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'];
            const d = new Date();
            const dateStr = `${dny[d.getDay()]}, ${d.getDate()}. ${d.getMonth() + 1}.`;
            document.getElementById('current-date-display').innerText = dateStr;
        }

        // Zkontroluje, jestli už není zítra - pokud ano, vynuluje fajfky
        function checkNewDay() {
            const today = new Date().toDateString();
            if (state.currentDay && state.currentDay !== today) {
                state.userA.checkedHabits = {};
                state.userA.questDone = false;
                state.userB.checkedHabits = {};
                state.userB.questDone = false;
                state.currentDay = today;
                save(); // Uloží odškrtnutý stav na server
            } else if (!state.currentDay) {
                state.currentDay = today;
            }
        }

        async function syncData(manual = false) {
            if (isSaving) return; 
            
            const btn = document.getElementById('sync-btn');
            if (manual && btn) btn.innerText = "⏳...";

            try {
                const res = await fetch(`${API_URL}?t=${Date.now()}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.userA) {
                        const serverTime = data.lastUpdated || 0;
                        const localTime = state.lastUpdated || 0;
                        
                        if (serverTime >= localTime) {
                            state = data;
                            checkNewDay(); // Okamžitě po stažení zkontroluje den
                            render();
                        }
                    }
                }
            } catch (e) { console.error("Sync error"); }

            if (manual && btn) btn.innerText = "🔄 SYNC";
        }

        async function save() {
            state.lastUpdated = Date.now();
            render();
            isSaving = true;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state)
                });
            } catch (e) { console.error("Save error"); }
            isSaving = false;
        }

        function render() {
            renderDate();

            document.getElementById('btn-userA').className = `py-3 rounded-xl font-bold transition-all ${currentUser === 'userA' ? 'bg-white/20 shadow-md' : 'opacity-40'}`;
            document.getElementById('btn-userB').className = `py-3 rounded-xl font-bold transition-all ${currentUser === 'userB' ? 'bg-white/20 shadow-md' : 'opacity-40'}`;
            document.getElementById('score-userA').innerText = state.userA.weeklyPoints;
            document.getElementById('score-userB').innerText = state.userB.weeklyPoints;
            
            // Avatar posuv (zastavíme na 95%, aby nepřejel trať)
            document.getElementById('avatar-userA').style.left = Math.min((state.userA.weeklyPoints / GOAL) * 95, 95) + "%";
            document.getElementById('avatar-userB').style.left = Math.min((state.userB.weeklyPoints / GOAL) * 95, 95) + "%";

            const hf = document.getElementById('hall-of-fame');
            if (state.lastWinner) {
                hf.classList.remove('hidden');
                document.getElementById('last-winner').innerText = state.lastWinner;
            } else { hf.classList.add('hidden'); }

            const list = document.getElementById('habit-list');
            list.innerHTML = '';
            HABITS.forEach(h => {
                const ch = state[currentUser].checkedHabits[h.id];
                const div = document.createElement('div');
                div.onclick = () => toggleHabit(h.id);
                div.className = `flex items-center gap-4 p-4 rounded-2xl border transition-all cursor-pointer ${ch ? 'bg-green-500/20 border-green-500/50 opacity-50' : 'bg-black/30 border-white/10 hover:bg-white/5'}`;
                div.innerHTML = `<div class="w-7 h-7 rounded-lg border-2 flex items-center justify-center transition-colors ${ch ? 'bg-green-500 border-none shadow-[0_0_10px_#22c55e]' : 'border-white/20'}">${ch ? '✓' : ''}</div><span class="text-2xl">${h.icon}</span><span class="flex-1 font-bold tracking-tight text-sm">${h.label}</span><span class="font-black text-green-400 text-sm bg-green-400/10 px-2 py-1 rounded-md">+${h.points}</span>`;
                list.appendChild(div);
            });

            const dayIndex = (new Date().getDay() + 6) % 7; 
            document.getElementById('today-quest').innerText = SIDE_QUESTS[dayIndex % SIDE_QUESTS.length];
            document.getElementById('ezo-quote').innerText = `„${EZO_QUOTES[dayIndex % EZO_QUOTES.length]}“`;
            
            const qBtn = document.getElementById('quest-btn');
            qBtn.disabled = state[currentUser].questDone;
            if (state[currentUser].questDone) {
                qBtn.className = "bg-green-500/50 text-white px-5 py-3 rounded-xl font-bold text-xs z-10 opacity-50";
                qBtn.innerText = "✓ SPLNĚNO";
            } else {
                qBtn.className = "bg-indigo-500 px-5 py-3 rounded-xl font-bold text-xs shadow-lg shadow-indigo-500/30 active:scale-95 transition-transform z-10";
                qBtn.innerText = "SPLNIT";
            }

            const logDiv = document.getElementById('log');
            const allLogs = [...state.userA.log, ...state.userB.log].sort((a,b) => b.ts - a.ts).slice(0, 5);
            if(allLogs.length === 0) logDiv.innerHTML = "Zatím se nic nestalo...";
            else logDiv.innerHTML = allLogs.map(l => `<div class="flex justify-between border-b border-white/5 pb-2 pt-1"><span>${l.icon} <strong>${l.u}</strong>: ${l.a}</span><span class="font-bold ${l.d > 0 ? 'text-green-400' : 'text-red-400'}">${l.d > 0 ? '+' : ''}${l.d}</span></div>`).join('');
        }

        function switchUser(id) { currentUser = id; localStorage.setItem('activeUser', id); render(); }

        function toggleHabit(id) {
            checkNewDay(); // Jistota je jistota
            const h = HABITS.find(x => x.id === id);
            const was = !!state[currentUser].checkedHabits[id];
            state[currentUser].checkedHabits[id] = !was;
            const delta = was ? -h.points : h.points;
            state[currentUser].weeklyPoints = Math.max(0, state[currentUser].weeklyPoints + delta);
            state[currentUser].log.unshift({ u: currentUser === 'userA' ? 'Lůca' : 'Kája', a: h.label, d: delta, icon: h.icon, ts: Date.now() });
            save();
        }

        function addPenalty(label, delta, icon) {
            state[currentUser].weeklyPoints = Math.max(0, state[currentUser].weeklyPoints + delta);
            state[currentUser].log.unshift({ u: currentUser === 'userA' ? 'Lůca' : 'Kája', a: label, d: delta, icon: icon, ts: Date.now() });
            save();
        }

        function completeQuest() {
            checkNewDay();
            if (state[currentUser].questDone) return;
            state[currentUser].questDone = true;
            state[currentUser].weeklyPoints += 15;
            state[currentUser].log.unshift({ u: currentUser === 'userA' ? 'Lůca' : 'Kája', a: "Výzva", d: 15, icon: "⚡", ts: Date.now() });
            save();
        }

        function addCustom() {
            const val = document.getElementById('custom-input').value.trim();
            if (!val) return;
            state[currentUser].weeklyPoints += 10;
            state[currentUser].log.unshift({ u: currentUser === 'userA' ? 'Lůca' : 'Kája', a: val, d: 10, icon: "🏋️", ts: Date.now() });
            document.getElementById('custom-input').value = '';
            save();
        }

        function archiveWeek() {
            if(confirm("Opravdu ukončit tento týden a vyhlásit vítězku?")) {
                let winner = "Remíza!";
                if (state.userA.weeklyPoints > state.userB.weeklyPoints) winner = "Lůca 🔥";
                else if (state.userB.weeklyPoints > state.userA.weeklyPoints) winner = "Kája 🔥";
                
                state = {
                    userA: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] },
                    userB: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] },
                    lastWinner: winner,
                    lastUpdated: Date.now(),
                    currentDay: new Date().toDateString()
                };
                save();
            }
        }

        function totalReset() {
            if(confirm("POZOR! Smaže úplně všechno včetně bodů a historie. Pokračovat?")) {
                state = {
                    userA: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] },
                    userB: { weeklyPoints: 0, checkedHabits: {}, questDone: false, log: [] },
                    lastWinner: null,
                    lastUpdated: Date.now(),
                    currentDay: new Date().toDateString()
                };
                save();
            }
        }

        syncData();
        setInterval(() => syncData(false), 30000);
    </script>
</body>
</html>
